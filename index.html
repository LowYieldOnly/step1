<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FAF7FC">
<script>(function(){try{var s=localStorage.getItem('lyo_theme');var m=(s==='light'||s==='dark')?s:((window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light');document.documentElement.setAttribute('data-theme',m);var mt=document.querySelector('meta[name="theme-color"]');if(mt)mt.setAttribute('content',m==='dark'?'#0C0912':'#FAF7FC');}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;500;600;700;800&family=Newsreader:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<title>LOW YIELD ONLY</title>
<style>
:root{
  color-scheme:light dark;
  /* ============================================================
     THEME — light (white with a whisper of lavender; deep royal
     purple accent, antique-gold hairline accents). Canonical
     tokens use the handoff's names; legacy aliases below keep
     existing rules working. Flat: hairlines, no glass/glow.
     ============================================================ */
  --bg:#FAF7FC; --surface:#FFFFFF; --surface-2:#F1EBF7;
  --text:#171320; --text-2:#544B62; --text-muted:#8B8298;
  --accent:#6A2C9B; --accent-hover:#54217B; --accent-soft:#7E3AB4; --accent-bg:#F0E6F9; --accent-contrast:#FFFFFF;
  --border:#E7DEF0; --border-strong:#D0C3E0; --ring-track:#E7DEF0;
  --gold:#9C7A22; --gold-soft:#F4ECD8;
  --success:#2E6B45; --success-bg:#E7EEE7;
  --warning:#8A5A16; --warning-bg:#F4ECD8;
  --danger:#992D30;  --danger-bg:#F5E4E4;
  --info:#6A2C9B;    --info-bg:#F0E6F9;
  /* subject / category coding (kept for scheduler accents) */
  --cat-blue:#2F6FE0; --cat-teal:#0E9384; --cat-violet:#7C5CFC; --cat-amber:#B45309; --cat-rose:#D6336C; --cat-green:#2C9A5A;
  --scrim:rgba(20,14,28,.5); --toast-bg:#1A1322; --toast-ink:#FFFFFF;
  --shadow:0 1px 2px rgba(30,20,45,.05),0 6px 20px -14px rgba(30,20,45,.16);
  --radius-sm:3px; --radius:5px; --radius-lg:8px;

  /* ---- Legacy aliases → canonical tokens (keeps existing rules working) ---- */
  --surface-base:var(--bg); --surface-raised:var(--surface); --surface-overlay:var(--surface); --surface-sunken:var(--surface-2);
  --text-primary:var(--text); --text-secondary:var(--text-2);
  --bg1:var(--bg); --bg2:var(--surface-2); --soft:var(--surface-2);
  --panel:var(--surface); --panel2:var(--surface-2);
  --ink:var(--text); --muted:var(--text-2); --faint:var(--text-muted);
  --line:var(--border); --line2:var(--border-strong);
  --phos:var(--accent-soft); --phos2:var(--accent-hover); --phos-dim:var(--accent-soft); --phos-soft:var(--accent-bg); --phos-glow:transparent;
  --amber:var(--warning); --amber2:var(--warning); --amber-soft:var(--warning-bg); --amber-glow:transparent;
  --cyan:var(--info); --cyan2:var(--info); --cyan-soft:var(--info-bg); --cyan-glow:transparent;
  --violet:var(--info); --violet-soft:var(--info-bg);
  --red:var(--danger); --red-soft:var(--danger-bg);
  --blue:var(--accent); --blue-soft:var(--accent-bg); --green:var(--success); --navy:var(--toast-bg);
  --on-accent:var(--accent-contrast);
  --r:var(--radius-lg);
  /* ---- Typography (Mulish — warm humanist sans; mono kept for data) ---- */
  --font-ui:"Mulish",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --font-display:"Newsreader",Georgia,"Times New Roman",serif;  /* scholarly serif for big titles */
  --font-read:"Source Serif 4",Georgia,"Times New Roman",serif;  /* long-form only */
  --font-mono:var(--font-ui);  /* full Mulish — mono role folded into the UI font */
  --mono:var(--font-mono); --sans:var(--font-ui);
}
:root[data-theme="dark"]{
  color-scheme:dark;
  /* dark — near-black with a purple undertone, luminous purple
     accent, antique gold. The signature look (Leferi-inspired). */
  --bg:#0C0912; --surface:#161320; --surface-2:#201A2E;
  --text:#F6F3FA; --text-2:#B4ABC4; --text-muted:#7E7590;
  --accent:#A879E6; --accent-hover:#BB93EE; --accent-soft:#B98FEC; --accent-bg:#1E1730; --accent-contrast:#120A1E;
  --border:#282136; --border-strong:#3B3150; --ring-track:#282136;
  --gold:#CBA24E; --gold-soft:#231C12;
  --success:#5FB07C; --success-bg:#16241B;
  --warning:#D2A24E; --warning-bg:#241C10;
  --danger:#DE7A73;  --danger-bg:#2A171A;
  --info:#B98FEC;    --info-bg:#1E1730;
  --cat-blue:#6AA5FF; --cat-teal:#4FD1C5; --cat-violet:#B98FEC; --cat-amber:#F0B24B; --cat-rose:#F472A0; --cat-green:#63C88B;
  --scrim:rgba(4,2,8,.66); --toast-bg:#201A2E; --toast-ink:#F6F3FA;
  --shadow:none;
}
:root[data-theme="light"]{color-scheme:light}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{background:var(--bg)}
html,body{margin:0;color:var(--ink);font-family:var(--font-ui);font-size:16px;line-height:1.6;font-variant-numeric:tabular-nums slashed-zero;font-feature-settings:"tnum" 1,"zero" 1}
body{padding-bottom:40px;position:relative;min-height:100vh;background:var(--bg)}
/* dark: white blooms bolder — let it breathe a touch */
:root[data-theme="dark"] body{line-height:1.65;letter-spacing:.005em}
/* schedule numbers — times, dates, counts, timers: align + disambiguate */
.tabular{font-variant-numeric:tabular-nums slashed-zero;font-feature-settings:"tnum" 1,"zero" 1}
button{font-family:inherit;color:inherit}
.wrap{max-width:680px;margin:0 auto;padding:24px 20px 96px}
.muted{color:var(--muted)} .small{font-size:13px} .center{text-align:center}
b{color:var(--ink)}

/* top bar + nav */
.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 16px;background:color-mix(in srgb,var(--surface-raised) 82%,transparent);backdrop-filter:blur(16px) saturate(1.2);-webkit-backdrop-filter:blur(16px) saturate(1.2);border-bottom:1px solid var(--line)}
.brandbtn{background:none;border:0;color:var(--muted);font-weight:800;font-size:13px;cursor:pointer;padding:12px 10px;margin:-12px -10px;display:flex;align-items:center;gap:7px;min-width:0;overflow:hidden;border-radius:10px}
.brandbtn .brandnm{color:var(--ink);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--mono);font-size:12.5px;text-transform:uppercase;letter-spacing:.1em}
.brandbtn:hover{color:var(--phos)} .brandbtn:hover .brandnm{color:var(--phos)}
.topright{display:flex;align-items:center;gap:11px;flex:0 0 auto}
.led{width:8px;height:8px;border-radius:50%;background:var(--phos-dim)}
.iconbtn{background:none;border:0;font-size:21px;color:var(--muted);cursor:pointer;padding:11px 12px;margin:-9px -6px;line-height:1;border-radius:10px;transition:color .15s}
.iconbtn:hover{color:var(--phos)}
.nav{position:sticky;top:50px;z-index:19;display:flex;gap:5px;padding:9px 12px;background:color-mix(in srgb,var(--surface-raised) 82%,transparent);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--line);max-width:680px;margin:0 auto}
.navb{flex:1;background:none;border:0;color:var(--faint);font-weight:600;font-size:13px;letter-spacing:.01em;font-family:var(--sans);padding:10px 6px;cursor:pointer;transition:color .18s,box-shadow .18s}
.navb:hover{color:var(--muted)}
.navb.on{color:var(--phos);box-shadow:inset 0 -2px 0 var(--phos)}

/* cards */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:22px;margin:18px 0}
.card.soft{background:var(--soft);border-color:transparent}
.cardhd{position:relative;font-family:var(--font-display);font-weight:600;font-size:18px;margin-bottom:15px;padding-bottom:11px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;letter-spacing:-.005em;color:var(--ink);line-height:1.25}
.cardhd::after{content:"";position:absolute;left:0;bottom:0;width:26px;height:2px;border-radius:1px;background:var(--gold);opacity:.9}
.pill{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--phos);letter-spacing:.09em;text-transform:uppercase}

/* hero */
.hero{position:relative;display:flex;flex-direction:column;background:var(--accent-bg);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin:18px 0;overflow:hidden}
.herorow{display:flex;align-items:center;gap:24px}
.herostat{display:flex;align-items:center;gap:9px;margin-top:18px;padding-top:16px;border-top:1px solid color-mix(in srgb,var(--gold) 45%,transparent);font-size:13px;line-height:1.4;color:var(--text-2)}
.herostat.warn{color:var(--warning)}
.hsdot{flex:0 0 auto;width:8px;height:8px;border-radius:50%;background:var(--success)}
.herostat.warn .hsdot{background:var(--warning)}
.hero::after{content:"";position:absolute;inset:0;pointer-events:none}
.hero-l,.hero-r{position:relative}
.hero .big{font-family:var(--font-display);font-size:40px;font-weight:600;letter-spacing:-.01em;line-height:1.05;color:var(--ink)}
.hero .big span{font-family:var(--sans);font-size:13px;font-weight:600;color:var(--muted);letter-spacing:0;text-shadow:none}
.hero .sub{color:var(--muted);font-size:13.5px;margin-top:10px}

/* daily encouragement / wellness nudge (top of Today) */
.cheer{display:flex;align-items:flex-start;gap:11px;background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:var(--r);padding:12px 14px;margin:12px 0}
.cheer-ic{font-size:19px;line-height:1.45;flex:0 0 auto}
.cheer-tx{font-size:14px;color:var(--ink);line-height:1.5;min-width:0}
.cheer-tx b{color:var(--ink);font-weight:700}
.cheer-by{color:var(--text-2);font-style:italic;white-space:nowrap}

/* ring (analog gauge) */
.ring{display:block}
.statpct{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:64px}
.statpct-n{font-family:var(--font-display);font-weight:600;color:var(--ink);line-height:1;letter-spacing:-.01em}
.statpct-n span{font-size:.46em;color:var(--muted);font-weight:500;margin-left:1px}
.statpct-l{font-family:var(--sans);font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.16em;color:var(--faint)}
.ring .rbg{fill:none;stroke:var(--ring-track);stroke-width:6;stroke-dasharray:1.4 5;stroke-linecap:round}
.ring .rfg{fill:none;stroke:var(--phos);stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset .8s cubic-bezier(.5,1.4,.4,1)}
.ring .rdot{fill:var(--phos)}
.ring .rtxt{fill:var(--ink);font-family:var(--mono);font-size:15px;font-weight:700;text-anchor:middle;dominant-baseline:middle}

/* status */
.status{position:relative;border-radius:13px;padding:12px 14px 12px 34px;font-size:13.5px;margin:12px 0;line-height:1.45;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.status::before{content:"";position:absolute;left:14px;top:15px;width:9px;height:9px;border-radius:50%}
.status.ok{background:var(--success-bg);border:1px solid color-mix(in srgb,var(--success) 30%,transparent);color:var(--success)}
.status.ok::before{background:var(--success)}
.status.warn{background:var(--warning-bg);border:1px solid color-mix(in srgb,var(--warning) 32%,transparent);color:var(--warning)}
.status.warn::before{background:var(--warning)}
.status.info{background:var(--info-bg);border:1px solid color-mix(in srgb,var(--info) 30%,transparent);color:var(--info)}
.status.info::before{background:var(--info)}
.pacesvg{width:100%;height:auto;display:block;margin:8px 0 2px;overflow:visible}
.pgrid{stroke:var(--line);stroke-width:1}
.pax{fill:var(--muted);font-family:var(--mono);font-size:8px;letter-spacing:.02em}
.ptoday{stroke:var(--amber);stroke-width:1;stroke-dasharray:2 3;opacity:.85}
.parea{fill:var(--phos-soft);opacity:.45}
.pideal{fill:none;stroke:var(--cyan);stroke-width:1.6;stroke-dasharray:4 3;opacity:.9;stroke-linecap:round;stroke-linejoin:round}
.pactual{fill:none;stroke:var(--phos);stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 3px var(--phos-glow))}
.placeleg{display:flex;gap:18px;justify-content:center;margin:4px 0 2px}
.pl{display:flex;align-items:center;gap:7px;color:var(--muted);font-family:var(--mono);font-size:10.5px}
.pl::before{content:"";width:14px;height:3px;border-radius:2px}
.pl-a::before{background:var(--phos)}
.pl-i::before{background:var(--cyan);opacity:.9}
/* readiness layer UI */
.status.bad{background:var(--danger-bg);border:1px solid color-mix(in srgb,var(--danger) 32%,transparent);color:var(--danger)}
.status.bad::before{background:var(--danger)}
.hchips{margin:10px 0 0}
.hcav{margin:6px 0 0}
.rchip{display:inline-flex;align-items:center;gap:9px;width:100%;text-align:left;border-radius:12px;padding:10px 13px;border:1px solid var(--line2);background:var(--bg2);color:var(--ink);font-family:inherit;font-size:12.5px;cursor:pointer;transition:border-color .15s}
.rchip:hover{border-color:var(--phos-dim)}
.rchip-n{font-family:var(--mono);font-weight:700;font-size:16px}
.rchip-t{color:var(--muted)}
.rchip-ok .rchip-n{color:var(--phos)}
.rchip-warn .rchip-n{color:var(--amber)}
.rchip-bad .rchip-n{color:var(--red)}
.rchip-info{justify-content:center;color:var(--cyan)}
.form2{display:flex;flex-direction:column;gap:10px}
.form2 label{display:flex;flex-direction:column;gap:5px;font-size:12.5px;color:var(--muted);font-weight:600}
.form2 input,.form2 select{background:var(--bg2);border:1px solid var(--line2);color:var(--ink);border-radius:10px;padding:11px;font-size:15px;font-family:inherit}
.form2 input:focus,.form2 select:focus{outline:none;border-color:var(--phos);box-shadow:0 0 0 3px var(--phos-soft)}
.form2 .opt{font-weight:500;color:var(--faint);text-transform:none;letter-spacing:0}
.alist{display:flex;flex-direction:column;gap:1px}
.arow{display:flex;align-items:center;gap:10px;padding:8px 3px;border-bottom:1px solid var(--line)}
.arow:last-child{border-bottom:0}
.adot{flex:0 0 auto;width:9px;height:9px;border-radius:50%;background:var(--faint)}
.adot.ok{background:var(--phos)}
.adot.warn{background:var(--amber)}
.adot.bad{background:var(--red)}
.adot.info{background:var(--cyan)}
.aform{flex:1;min-width:0;font-size:13.5px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.apct{font-family:var(--mono);font-weight:700;font-size:14px}
.adate{font-family:var(--mono);font-size:11px;color:var(--faint)}
.alink{background:none;border:0;color:var(--faint);font-size:11px;cursor:pointer;padding:2px 4px;font-family:inherit}
.alink:hover{color:var(--red)}
.uwtop{display:flex;align-items:baseline;justify-content:space-between;margin:2px 0 10px}
.uwbig{font-family:var(--mono);font-weight:700;font-size:26px;color:var(--phos)}
.uwbig span{font-size:12px;color:var(--muted);font-weight:600}
.uwsub{font-family:var(--mono);font-size:12px;color:var(--muted)}
.uwhd{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);margin:12px 0 6px}
.flagb{flex:0 0 auto;width:26px;height:26px;border-radius:8px;border:1.5px solid transparent;background:none;color:var(--faint);font-size:13px;cursor:pointer;transition:all .15s}
.flagb:hover{color:var(--amber);border-color:var(--line2)}
.flagb.on{color:var(--warning);border-color:var(--warning);background:var(--warning-bg)}
.vrow.shaky .vn{border-color:var(--amber)!important}

/* video list */
.vlist{display:flex;flex-direction:column;gap:5px}
.vgrp{margin-bottom:4px}
.vgrp .vghdr{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin:4px 0 6px}
.vrow{display:flex;align-items:center;gap:11px;padding:6px 8px;border-radius:11px;transition:background .15s}
.vrow:hover{background:var(--surface-sunken)}
.mfoot{text-align:center;font-family:var(--mono);font-size:10px;color:var(--faint);padding:8px 0 4px;letter-spacing:.04em;opacity:.7}
.vrow.done .vn{opacity:.45;text-decoration:line-through}
.vrow.done .vmin{opacity:.4}
.chk{flex:0 0 auto;width:26px;height:26px;border-radius:8px;border:1.5px solid var(--line2);background:var(--bg2);color:var(--on-accent);font-size:14px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .16s}
.chk:hover{border-color:var(--phos-dim)}
.chk.on{background:var(--phos);border-color:var(--phos)}
.vmeta{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.vn{font-size:14px;border-left:3px solid var(--border-strong);padding-left:9px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;flex:0 1 auto}
.cpy{flex:0 0 auto;background:var(--panel2);border:1px solid var(--line2);color:var(--muted);border-radius:8px;padding:3px 8px;font-size:11.5px;font-weight:700;cursor:pointer;white-space:nowrap}
.cpy:hover{color:var(--phos);border-color:var(--phos-dim)}
.vmin{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--faint);flex:0 0 auto;padding-left:6px}
.badge{display:inline-block;font-size:9px;font-weight:800;padding:2px 5px;border-radius:5px;color:var(--on-accent)}
.badge.bnb{background:var(--phos)}.badge.pa{background:var(--violet)}.badge.sk{background:var(--amber)}
.anki{display:flex;align-items:center;gap:12px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
.akmeta{display:flex;flex-direction:column;min-width:0;flex:1}
.aklab{font-size:13.5px;font-weight:700}
.akcount{font-family:var(--mono);font-size:11px;color:var(--faint);overflow:hidden;text-overflow:ellipsis;letter-spacing:.02em}
.cpyall{flex:0 0 auto;background:var(--phos-soft);border:1px solid var(--phos-dim);color:var(--phos);border-radius:10px;padding:8px 13px;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;transition:all .15s}
.cpyall:hover{background:var(--phos);color:var(--on-accent)}
.aktags{margin-top:10px}
.aktags>summary{list-style:none;cursor:pointer;font-family:var(--mono);font-size:11.5px;font-weight:700;color:var(--phos);padding:5px 0;text-transform:uppercase;letter-spacing:.05em}
.aktags>summary::-webkit-details-marker{display:none}
.aktags>summary::before{content:"▸ ";color:var(--faint)}
.aktags[open]>summary::before{content:"▾ "}
.aktaglist{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.aktagrow{display:flex;align-items:center;gap:8px;width:100%;text-align:left;background:var(--bg2);border:1px solid var(--line);border-radius:9px;padding:8px 10px;cursor:pointer;transition:border-color .14s}
.aktagrow:hover{border-color:var(--phos-dim)}
.aktagname{flex:1;min-width:0;font-family:var(--mono);font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.aktagrow:hover .aktagname{color:var(--ink)}
.aktagcopy{flex:0 0 auto;color:var(--phos);font-size:13px}

.rowtools{margin-top:14px;display:flex;gap:8px}
.habits{margin:0;padding-left:18px;color:var(--muted);font-size:13.5px}
.habits li{margin:5px 0}

/* month calendar */
.calbar{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.calnav{width:40px;height:40px;border-radius:11px;border:1px solid var(--line2);background:var(--panel2);color:var(--ink);font-size:18px;cursor:pointer;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:all .15s}
.calnav:hover{border-color:var(--phos-dim);color:var(--phos)}
.calmon{font-family:var(--mono);font-weight:700;font-size:15px;flex:1;text-align:center;letter-spacing:.05em;text-transform:uppercase;color:var(--ink)}
.caltoday{flex:0 0 auto;font-family:var(--mono);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--phos);background:var(--phos-soft);border:1px solid var(--phos-dim);border-radius:10px;padding:9px 12px;cursor:pointer;transition:all .15s}
.caltoday:hover{background:var(--phos);color:var(--on-accent)}
.calwk{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px}
.calwk div{text-align:center;font-family:var(--mono);font-size:10px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.04em}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.calcell{aspect-ratio:1/1;border:1px solid var(--line);background:var(--surface-sunken);border-radius:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:6px 2px 2px;gap:3px;position:relative;overflow:hidden;transition:transform .1s,border-color .15s,background .15s}
.calcell:not(.empty):hover{border-color:var(--line2)}
.calcell.empty{border:0;background:transparent;cursor:default}
.calcell .cd{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--ink);line-height:1}
.calcell .ci{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--muted);line-height:1;letter-spacing:.02em}
.calcell.past{opacity:.35}.calcell.past .cd{color:var(--muted)}
.calcell.load{background:var(--phos-soft);border-color:var(--line2)}.calcell.load .ci{color:var(--phos)}
.calcell.alldone{background:var(--accent-bg);border-color:var(--accent)}.calcell.alldone .ci{color:var(--accent);font-size:12px}
.calcell.rest,.calcell.off{background:var(--warning-bg)}.calcell.rest .ci,.calcell.off .ci{color:var(--amber)}
.calcell.review{background:var(--info-bg);border-color:var(--info)}.calcell.review .ci{color:var(--violet)}
.calcell.today{border-color:transparent;box-shadow:0 0 0 1.5px var(--phos) inset}
.calcell.sel{box-shadow:0 0 0 2px var(--ink) inset;border-color:transparent;animation:none}
.callegend{display:flex;flex-wrap:wrap;gap:12px;margin:14px 2px 4px;font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
.callegend span{display:flex;align-items:center;gap:5px}
.callegend .lg{width:10px;height:10px;border-radius:3px;display:inline-block;border:1px solid var(--line2)}
.callegend .lg.load{background:var(--phos-soft)}
.callegend .lg.alldone{background:var(--accent-bg);border-color:var(--accent)}
.callegend .lg.rest{background:var(--warning-bg)}
.callegend .lg.review{background:var(--info-bg);border-color:var(--info)}
.callegend .lg.off{background:var(--warning-bg)}
.daydetail{margin-top:18px}

/* progress bars */
.bars{display:flex;flex-direction:column;gap:10px}
.bar{display:flex;align-items:center;gap:10px}
.barlab{flex:0 0 42%;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bartrack{flex:1;height:8px;background:var(--bg2);border-radius:999px;overflow:hidden}
.barfill{height:100%;border-radius:999px;background:var(--accent);transition:width .5s cubic-bezier(.5,1.2,.4,1)}
.barpct{flex:0 0 auto;font-family:var(--mono);font-size:12px;color:var(--muted);width:38px;text-align:right}

/* forms / toggles */
.form{display:flex;flex-direction:column;gap:13px}
.form label{display:flex;flex-direction:column;gap:6px;font-size:12.5px;color:var(--muted);font-weight:600}
.form input{background:var(--bg2);border:1px solid var(--line2);color:var(--ink);border-radius:11px;padding:12px;font-size:15px;font-family:inherit;transition:border-color .15s,box-shadow .15s}
.form input:focus{outline:none;border-color:var(--phos);box-shadow:0 0 0 3px var(--phos-soft)}
.datebtn{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;text-align:left;background:var(--bg2);border:1px solid var(--line2);color:var(--ink);border-radius:11px;padding:12px;font-size:15px;font-family:inherit;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.datebtn:hover{border-color:var(--phos-dim)}
.datebtn:focus-visible{outline:none;border-color:var(--phos);box-shadow:0 0 0 3px var(--phos-soft)}
.datebtn .dim{color:var(--faint)}
.datebtn-ic{color:var(--phos);font-size:11px;opacity:.8}
.dpsheet{max-width:360px}
.dpnav{display:flex;align-items:center;gap:6px;padding:12px 14px 4px}
.dpnavbtn{flex:0 0 auto;width:38px;height:38px;border:1px solid var(--line2);background:var(--bg2);color:var(--phos);border-radius:10px;font-size:18px;line-height:1;cursor:pointer;font-family:var(--mono);transition:background .15s,border-color .15s}
.dpnavbtn:hover{background:var(--phos-soft);border-color:var(--phos-dim)}
.dpym{flex:1;text-align:center;font-family:var(--mono);font-weight:700;font-size:15px;letter-spacing:.03em;color:var(--ink)}
.dpgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:8px 14px 6px}
.dpdow{text-align:center;font-family:var(--mono);font-size:10px;color:var(--faint);padding:3px 0;text-transform:uppercase;letter-spacing:.06em}
.dpcell{aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;border:1px solid transparent;background:var(--bg2);color:var(--ink);border-radius:9px;font-size:14px;font-family:var(--mono);cursor:pointer;transition:background .12s,border-color .12s}
.dpcell:hover:not(.off){background:var(--phos-soft);border-color:var(--phos-dim)}
.dpcell.empty{background:none;border:0;cursor:default}
.dpcell.off{color:var(--faint);opacity:.3;cursor:default}
.dpcell.today{border-color:var(--cyan)}
.dpcell.sel{background:var(--phos);color:var(--on-accent);border-color:var(--phos);font-weight:700}
.flab{font-size:12.5px;color:var(--muted);font-weight:600;margin-top:2px}
.togrow{display:flex;flex-wrap:wrap;gap:7px}
.tog{background:var(--bg2);border:1px solid var(--line2);color:var(--muted);border-radius:11px;padding:9px 13px;font-size:13px;font-weight:600;cursor:pointer;transition:all .14s}
.tog:hover{color:var(--ink)}
.tog:active{transform:scale(.97)}
.tog.on{background:var(--phos-soft);border-color:var(--phos-dim);color:var(--phos)}
.sysgrid .tog{font-size:12px;padding:7px 10px}
.mt{margin-top:6px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
.kv{font-family:var(--mono);font-size:25px;font-weight:700;color:var(--phos)}
.kvl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}

/* buttons */
.btn{background:var(--accent);border:0;color:var(--on-accent);font-weight:700;font-size:15px;padding:14px 18px;border-radius:var(--radius);cursor:pointer;width:100%;letter-spacing:.01em;transition:transform .08s,background .18s}
.btn:hover{background:var(--accent-hover)}
.btn:active{transform:translateY(1px)}
.btn.ghost{background:var(--panel2);color:var(--ink);border:1px solid var(--line2);width:auto;font-weight:600}
.btn.ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn.big{padding:16px;font-size:16px;margin-top:8px}
.link{background:none;border:0;color:var(--phos);font-weight:700;cursor:pointer;padding:0;font-size:inherit;transition:color .15s}
.link:hover{color:var(--phos2)}
.link.block{display:block;width:100%;text-align:center;margin-top:10px;padding:8px}

/* onboarding */
.onb{max-width:560px}
.onboard{animation:fadeUp .45s ease both}
.onboard h1{font-family:var(--font-display);font-size:28px;font-weight:700;letter-spacing:0;margin:10px 0 2px;line-height:1.1}

/* welcome / hub chooser */
.welcomewrap{max-width:560px;padding-top:46px}
.welcome{text-align:center;animation:fadeUp .5s ease both}
.wbrand{font-family:var(--font-display);font-weight:500;font-size:clamp(30px,8.6vw,44px);letter-spacing:0;line-height:1.04;color:var(--accent-soft);text-transform:none}
.wtag{color:var(--muted);margin:13px 0 28px;font-size:13px;font-family:var(--mono);letter-spacing:.02em}
.wservire{display:flex;align-items:center;justify-content:center;gap:15px;margin:8px 0 30px}
.wservire span{font-family:var(--font-display);font-style:italic;font-weight:500;font-size:24px;color:var(--text-2);letter-spacing:.05em}
.wservire::before,.wservire::after{content:"";height:1px;width:42px;background:linear-gradient(to var(--_d,right),transparent,var(--gold))}
.wservire::after{--_d:left}
.hubs{display:flex;flex-direction:column;gap:16px}
.hubcard{position:relative;display:block;width:100%;text-align:left;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px;cursor:pointer;overflow:hidden;transition:transform .14s,border-color .2s}
.hubcard:hover{border-color:var(--phos-dim)}
@media (hover:hover){.hubcard:hover{transform:translateY(-2px)}.calcell:not(.empty):hover{transform:translateY(-1px)}}
.hubcard:active{transform:translateY(0)}
.hubtop{display:flex;align-items:center;justify-content:space-between;gap:12px}
.hubname{font-family:var(--font-display);font-size:23px;font-weight:600;letter-spacing:0;color:var(--ink)}
.hubcard.soon{cursor:default;opacity:.62}
.hubcard.soon:hover{border-color:var(--line);transform:none}
.soontag{font-family:var(--sans);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.13em;color:var(--faint);border:1px solid var(--border-strong);border-radius:4px;padding:3px 8px;white-space:nowrap}
.hubsub{color:var(--muted);font-size:12px;margin-top:10px;font-family:var(--mono);letter-spacing:.01em}
.hubgo{margin-top:14px;font-size:11px;font-weight:700;color:var(--phos);text-transform:uppercase;letter-spacing:.11em;font-family:var(--mono)}
.wfoot{margin-top:34px;display:flex;flex-direction:column;align-items:center;gap:9px}
.wfoot .acct{color:var(--faint);font-size:12px;font-family:var(--sans);letter-spacing:.01em}
.wfootlink{background:none;border:0;padding:2px 4px;color:var(--text-2);font-family:var(--sans);font-size:12.5px;font-weight:500;letter-spacing:.01em;cursor:pointer;transition:color .15s}
.wfootlink:hover{color:var(--accent-soft)}

/* ordered systems (reorderable) */
.sysord{display:flex;flex-direction:column;gap:6px;margin:10px 0 8px}
.sysrow{display:flex;align-items:center;gap:9px;background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:7px 9px;opacity:.5;transition:opacity .14s,border-color .14s,background .14s}
.sysrow.on{opacity:1;background:var(--surface-sunken)}
.sysinc{flex:0 0 auto;width:24px;height:24px;border-radius:7px;border:1.5px solid var(--line2);background:transparent;color:var(--on-accent);font-size:13px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .14s}
.sysrow.on .sysinc{background:var(--phos);border-color:var(--phos)}
.sysnm{flex:1;min-width:0;font-size:13.5px;border-left:3px solid;padding-left:9px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ordbtns{flex:0 0 auto;display:flex;gap:4px}
.ordbtn{width:30px;height:28px;border-radius:8px;border:1px solid var(--line2);background:var(--panel2);color:var(--muted);font-size:12px;cursor:pointer;transition:all .14s}
.ordbtn:hover:not([disabled]){color:var(--phos);border-color:var(--phos-dim)}
.ordbtn[disabled]{opacity:.25;cursor:default}

.overlay{position:fixed;inset:0;background:var(--scrim);z-index:60;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);animation:fadeIn .2s ease;overflow:auto}
.sheet{background:var(--surface-overlay);border:1px solid var(--line);border-radius:16px;width:100%;max-width:480px;max-height:calc(100vh - 40px);overflow:auto;padding:8px;box-shadow:var(--shadow);animation:popIn .24s cubic-bezier(.3,1.1,.4,1)}
.sheethd{font-family:var(--mono);font-weight:700;padding:16px 14px 10px;text-transform:uppercase;letter-spacing:.1em;font-size:12px;color:var(--muted)}
.mrow{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:0;border-top:1px solid var(--line);color:var(--ink);font-size:15px;padding:15px 14px;cursor:pointer;font-weight:600;transition:background .12s}
.mrow:hover{background:var(--accent-bg)}
.mrow.danger{color:var(--red)} .mrow.danger:hover{background:var(--danger-bg)}
.mrow.close{color:var(--muted);font-weight:700}
.acctrow{flex-direction:column;align-items:flex-start;gap:2px;cursor:default;border-top:0}
.acctlbl{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--faint)}
.acctml{font-size:14px;color:var(--ink);font-weight:600;word-break:break-all}
.btn:disabled{opacity:.6;cursor:default;filter:saturate(.55)}
.authcard{max-width:380px;margin:0 auto;text-align:left;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:var(--shadow)}
.authtabs{display:flex;gap:6px;max-width:380px;margin:0 auto 14px;background:var(--bg2);border:1px solid var(--line);border-radius:13px;padding:4px}
.atab{flex:1;background:none;border:0;color:var(--muted);font-weight:700;font-size:13px;padding:10px;border-radius:9px;cursor:pointer;font-family:var(--mono);letter-spacing:.03em;transition:background .15s,color .15s}
.atab.on{background:var(--accent);color:var(--on-accent)}
.autherr{color:var(--red);font-size:12.5px;margin:11px 2px 0;line-height:1.45;display:none}
.authforgot{display:block;text-align:center;margin:14px auto 0;font-size:13px}
.authspin{width:26px;height:26px;margin:24px auto 0;border:3px solid var(--line2);border-top-color:var(--phos);border-radius:50%;animation:aspin .8s linear infinite}
@keyframes aspin{to{transform:rotate(360deg)}}
.cfmsg{padding:4px 16px 14px;margin:0;color:var(--text-secondary);font-family:var(--font-read);font-size:15px;line-height:1.6;white-space:pre-line}
.mrow.solidred{justify-content:center;border-top:0;margin:6px 8px 4px;border-radius:var(--radius);background:var(--danger-bg);color:var(--danger);font-weight:700;letter-spacing:.01em}
.mrow.solidred:hover{background:color-mix(in srgb,var(--danger) 20%,transparent)}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);pointer-events:none;background:var(--toast-bg);color:var(--toast-ink);padding:13px 18px;border-radius:var(--radius);font-size:14px;font-weight:600;z-index:80;box-shadow:var(--shadow);opacity:0;transition:.28s cubic-bezier(.3,1.1,.4,1);max-width:90vw;border-left:3px solid var(--accent)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}
.toast button{pointer-events:auto;margin-left:12px;background:var(--phos-soft);border:1px solid var(--phos-dim);color:var(--phos);padding:6px 13px;border-radius:9px;cursor:pointer;font-weight:800;font-size:13px;transition:all .15s}
.toast button:hover{background:var(--accent);color:var(--on-accent)}

.cols>div{min-width:0}
@media (min-width:960px){
  .wrap{max-width:1072px}
  .nav{max-width:1072px}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:0 16px;align-items:start}
  .cols .daydetail{margin-top:0}
}

/* collapsible sections */
.fold>summary{list-style:none;cursor:pointer;font-family:var(--mono);font-size:11.5px;font-weight:700;color:var(--phos);padding:7px 0;text-transform:uppercase;letter-spacing:.05em}
.fold>summary::-webkit-details-marker{display:none}
.fold>summary::before{content:"▸ ";color:var(--faint)}
.fold[open]>summary::before{content:"▾ "}

/* per-card reset button */
.cardhd .hdreset{margin-left:auto;background:none;border:1px solid transparent;color:var(--faint);font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;padding:3px 7px;border-radius:7px;transition:color .15s,border-color .15s}
.cardhd .hdreset:hover{color:var(--red);border-color:rgba(224,100,94,.35)}

/* motion */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{transform:scale(.96);opacity:0}to{transform:none;opacity:1}}
@media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}}
</style>

/* ============================================================
   Step 1 Command Center — dynamic core (v2)
   - Plan = the remaining (unfinished) backlog, repacked from today
     to your exam date. Completing work, taking a day off, or moving
     your exam date simply re-distributes what's left.

   ============================================================ */

/* ---------- date helpers ---------- */

function normalizeCfg(c,key){

  if(!ok)c.sysOrder=SYS_ORDER_DEFAULT.slice();

function activate(key){S.active=key;S.cfg=S.cfgs[key]||null;}
function hubName(key){return key==="step1"?"STEP 1 Command Center":"M2 Scheduler";}
let _prevSig=null;

function persistObj(){return {active:S.active,cfgs:S.cfgs,vdone:S.vdone,vskip:S.vskip,vdoneDate:S.vdoneDate,akdone:S.akdone,notes:S.notes,streak:S.streak,assessments:S.assessments,uworld:S.uworld,amboss:S.amboss,vshaky:S.vshaky,settings:S.settings,_updatedAt:S._updatedAt,_resetAt:S._resetAt||0};}
function save(){S._updatedAt=Date.now();markStreakIfProgress();store.set(SKEY,JSON.stringify(persistObj()));Cloud.schedulePush();}

/* ---------- streak (set of studied dates; merge-safe) ---------- */
function progressSig(){let n=0;for(const k in S.vdone)if(S.vdone[k])n++;return n;}
function markStudiedToday(){S.streak=S.streak||{days:{}};S.streak.days=S.streak.days||{};S.streak.days[todayISO()]=true;}
function markStreakIfProgress(){const s=progressSig();if(_prevSig===null){_prevSig=s;return;}if(s>_prevSig)markStudiedToday();_prevSig=s;}
function studyDays(){const d=(S.streak&&S.streak.days)||{};return Object.keys(d).filter(k=>d[k]).sort();}
function currentStreak(){const set=new Set(studyDays());let d=new Date();d.setHours(0,0,0,0);if(!set.has(isoFromDate(d)))d=addDays(d,-1);let n=0;while(set.has(isoFromDate(d))){n++;d=addDays(d,-1);}return n;}

/* ============================================================
   BACKLOG — ordered list of items from the chosen resources.
   Item ids match the original scheme so prior progress carries over.
   ============================================================ */
function chunkItems(label,total,sys,r){const out=[],C=18;let left=total,k=0;while(left>0){const m=Math.min(C,left);out.push({sys,name:label,min:m,fa:"",tag:"",res:r,label,id:r+":"+label+"#"+k});left-=m;k++;}return out;}
function pathomaItems(p,sys){const vids=PVIDS[p[0]];if(!vids||!vids.length)return chunkItems("Pathoma Ch"+p[0]+": "+p[1],p[2],sys,"pathoma");return vids.map(v=>({sys,name:v[0],min:v[1],fa:"",tag:"",res:"pathoma",label:v[0],id:"p:"+v[0]}));}
function planSystems(){const c=S.cfg;const sel=new Set((c.systems&&c.systems.length)?c.systems:SYS);const ord=(c.sysOrder&&c.sysOrder.length)?c.sysOrder:SYS_ORDER_DEFAULT;return ord.filter(s=>sel.has(s));}
function hasRes(k){const r=S.cfg&&S.cfg.resources;if(!r)return (k==="fa"||k==="anking");return !!r[k];}
function buildBacklog(){
  const order=planSystems();
  const bySys={};CAT.forEach(c=>bySys[c.s]=c);
  const useB=hasRes("bnb"),useP=hasRes("pathoma"),useS=hasRes("sketchy");
  const out=[];
  if(useP&&order.length)PATHOMA.filter(p=>p[3]===null).forEach(p=>out.push(...pathomaItems(p,"General Pathology")));
  order.forEach(sn=>{const c=bySys[sn];if(!c)return;
    if(useB)c.v.forEach(v=>out.push({sys:sn,name:v[0],min:v[1],fa:v[2],tag:v[3]||"",res:"bnb",label:v[0],id:"b:"+v[0]}));
    if(useP)PATHOMA.filter(p=>p[3]===sn).forEach(p=>out.push(...pathomaItems(p,sn)));
    if(useS&&sn==="Infectious Disease")SKMICRO.forEach(m=>out.push(...chunkItems(m[0],m[1],sn,"skmicro")));
    if(useS)SKPHARM.filter(s=>s[2]===sn).forEach(s=>out.push(...chunkItems(s[0],s[1],sn,"skpharm")));
  });
  return out;
}

/* ============================================================
   SCHEDULER — pack the *unfinished* backlog onto study days from
   today to the exam, reserving a review/UWorld buffer at the end.
   ============================================================ */
let SCHED=null;   // {days:[{iso,off,rest,review,items,min}], atRisk:[items], stats:{...}, byId:{}}
function dayBudgetMin(d){const we=(d.getDay()===0||d.getDay()===6);const total=Math.max(15,Math.round((we?S.cfg.wkendHrs:S.cfg.wkdayHrs)*60));const reserved=(S.cfg.ankiMinPerDay||0)+(S.cfg.uworldMinPerDay||0);return Math.max(15,total-reserved);}
function isDone(id){return !!S.vdone[id];}
function isSkip(id){return !!S.vskip[id];}
function reflow(){
  const c=S.cfg; if(!c){SCHED=null;return;}
  const backlog=buildBacklog();
  const byId={};const orderIndex={};backlog.forEach((it,i)=>{byId[it.id]=it;orderIndex[it.id]=i;});
  const remaining=backlog.filter(it=>!isDone(it.id)&&!isSkip(it.id));
  const cursorISO=(c.startISO>todayISO())?c.startISO:todayISO();
  const examISO=c.examISO||isoFromDate(addDays(new Date(),120));
  // build candidate study dates [cursor, exam)
  const rest=c.restDays||[0]; const off=c.off||{};
  const studyDates=[]; let d=isoToDate(cursorISO); let guard=0;
  while(isoFromDate(d)<examISO && guard++<800){const iso=isoFromDate(d);const wd=d.getDay();
    if(!rest.includes(wd)&&!off[iso])studyDates.push(iso);
    d=addDays(d,1);
  }
  const review=Math.max(0,Math.min(c.reviewDays||0,studyDates.length));
  const contentDates=studyDates.slice(0,Math.max(0,studyDates.length-review));
  const reviewDates=studyDates.slice(Math.max(0,studyDates.length-review));
  // greedily pack remaining onto contentDates
  // minutes already completed TODAY consume today's budget, so checking off a
  // video doesn't free a slot that pulls a future video forward into today
  const todayISO_=todayISO(); let doneTodayMin=0;
  for(const id in (S.vdoneDate||{})){if(S.vdoneDate[id]===todayISO_&&byId[id])doneTodayMin+=byId[id].min;}
  const dayItems={}; contentDates.forEach(iso=>dayItems[iso]=[]);
  let qi=0; const atRisk=[];
  for(let di=0;di<contentDates.length;di++){
    const iso=contentDates[di];const budget=dayBudgetMin(isoToDate(iso));
    const isToday=(iso===todayISO_); let used=isToday?doneTodayMin:0; const started=isToday&&doneTodayMin>0;
    while(qi<remaining.length){const it=remaining[qi];
      if((dayItems[iso].length===0&&!started) || used+it.min<=budget+10){dayItems[iso].push(it);used+=it.min;qi++;}
      else break;
      if(used>=budget)break;
    }
  }
  while(qi<remaining.length){atRisk.push(remaining[qi]);qi++;}
  // pin completed items to the day they were finished, so they stay visible (checked)
  const donePins={};const vdd=S.vdoneDate||{};
  for(const id in vdd){const it=byId[id];if(it){(donePins[vdd[id]]=donePins[vdd[id]]||[]).push(it);}}
  // assemble full day list (for calendar) incl rest/off within window, oldest first
  const days=[]; const dayMap={};
  let dd=isoToDate(cursorISO); let g2=0;
  while(isoFromDate(dd)<examISO && g2++<800){const iso=isoFromDate(dd);const wd=dd.getDay();
    const isRest=rest.includes(wd), isOff=!!off[iso], isReview=reviewDates.includes(iso);
    const packed=dayItems[iso]||[]; const pinned=donePins[iso]||[];
    const items=packed.concat(pinned).sort((a,b)=>(orderIndex[a.id]!=null?orderIndex[a.id]:1e9)-(orderIndex[b.id]!=null?orderIndex[b.id]:1e9));
    const row={iso,off:isOff,rest:isRest&&!isOff,review:isReview&&!isOff&&!isRest,items,
      min:items.reduce((a,b)=>a+b.min,0),todo:packed.reduce((a,b)=>a+b.min,0)};
    days.push(row);dayMap[iso]=row;
    dd=addDays(dd,1);
  }
  // stats
  const remMin=remaining.reduce((a,b)=>a+b.min,0);
  const availMin=contentDates.reduce((a,iso)=>a+dayBudgetMin(isoToDate(iso)),0);
  const examDaysLeft=Math.max(0,daysBetween(todayISO(),examISO));
  const reqPerDay=contentDates.length?Math.ceil(remMin/contentDates.length):Infinity;
  SCHED={days,dayMap,atRisk,byId,reviewDates,contentDates,
    stats:{remMin,availMin,examDaysLeft,reqPerDay,feasible:remMin<=availMin,
           contentDaysLeft:contentDates.length,reviewDaysLeft:reviewDates.length,
           totalItems:backlog.length,doneItems:backlog.filter(it=>isDone(it.id)).length,
           remItems:remaining.length}};
}

/* ---------- progress ---------- */
function overall(){if(!SCHED)return {pct:0,done:0,total:0};const t=SCHED.stats.totalItems,dn=SCHED.stats.doneItems;return {pct:t?Math.round(dn/t*100):0,done:dn,total:t};}
function sysProgress(){const by={};buildBacklog().forEach(it=>{const k=it.sys;(by[k]=by[k]||{d:0,t:0});by[k].t++;if(isDone(it.id))by[k].d++;});return by;}

function unionTrue(x,y){const o={};x=x||{};y=y||{};for(const k in x)if(x[k])o[k]=true;for(const k in y)if(y[k])o[k]=true;return o;}
function mergeNotes(older,newer){const o=Object.assign({},older||{});const n=newer||{};for(const k in n){if(n[k]&&n[k].length)o[k]=n[k];else if(o[k]==null)o[k]=n[k];}return o;}
function mergeState(a,b){a=a||{};b=b||{};
  // a reset is a tombstone: any copy last saved BEFORE the reset predates it,
  // so its progress maps must not be union-merged back in (they'd resurrect
  // everything the user just cleared).
  const resetAt=Math.max(a._resetAt||0,b._resetAt||0);
  const strip=s=>((s._updatedAt||0)>=resetAt)?s:Object.assign({},s,{vdone:{},vskip:{},vdoneDate:{},akdone:{},notes:{},streak:{days:{}},assessments:{},uworld:{total:null,blocks:{}},amboss:{total:null,blocks:{}},vshaky:{}});
  if(resetAt){a=strip(a);b=strip(b);}
  const aT=a._updatedAt||0,bT=b._updatedAt||0;const newer=bT>=aT?b:a,older=bT>=aT?a:b;
  const out={};
  out.active=(newer.active!==undefined?newer.active:older.active)||null;
  out.cfgs={};["step1","nbme"].forEach(k=>{out.cfgs[k]=(newer.cfgs&&newer.cfgs[k])||(older.cfgs&&older.cfgs[k])||null;});
  out.vdone=unionTrue(a.vdone,b.vdone);
  out.vskip=unionTrue(a.vskip,b.vskip);
  for(const id in out.vdone)if(out.vskip[id])delete out.vskip[id];
  out.vdoneDate=Object.assign({},a.vdoneDate||{},b.vdoneDate||{});
  out.akdone=unionTrue(a.akdone,b.akdone);
  out.notes=mergeNotes(older.notes,newer.notes);
  out.streak={days:unionTrue((a.streak||{}).days,(b.streak||{}).days)};
  out.assessments=Object.assign({},a.assessments||{},b.assessments||{});
  out.uworld={total:((newer.uworld||{}).total!=null?(newer.uworld||{}).total:(older.uworld||{}).total),blocks:Object.assign({},(a.uworld||{}).blocks||{},(b.uworld||{}).blocks||{})};
  out.amboss={total:((newer.amboss||{}).total!=null?(newer.amboss||{}).total:(older.amboss||{}).total),blocks:Object.assign({},(a.amboss||{}).blocks||{},(b.amboss||{}).blocks||{})};
  out.vshaky=unionTrue(a.vshaky,b.vshaky);
  out.settings=Object.assign({},older.settings||{},newer.settings||{});
  out._updatedAt=Math.max(aT,bT);
  // keep key order identical to persistObj() — the sync layer compares
  // JSON.stringify(merged) vs JSON.stringify(current), so a mismatched key
  // order reads as "changed" every tick and loops adopt→render (screen blink)
  out._resetAt=resetAt;

Cloud.init=async function(){if(Cloud.inited||!fbEnabled())return;Cloud.inited=true;
  try{await Cloud.loadSDK();if(!firebase.apps.length)firebase.initializeApp(FB_CONFIG);Cloud.db=firebase.firestore();
    try{await Cloud.db.enablePersistence({synchronizeTabs:true});}catch(e){}
    try{await firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL);}catch(e){}
    firebase.auth().onAuthStateChanged(u=>Cloud.onAuth(u));
    // no anonymous fallback — onAuthStateChanged(null) shows the sign-in gate
  }catch(e){Cloud.inited=false;if(!AUTHED)renderAuthGate({offline:true});}};
Cloud.onAuth=function(u){
  // ignore leftover anonymous sessions from older versions
  if(u&&u.isAnonymous){try{firebase.auth().signOut();}catch(e){}return;}
  if(u&&!emailAllowed(u.email)){try{firebase.auth().signOut();}catch(e){}Cloud.user=null;AUTHED=false;renderAuthGate({denied:true});return;}
  Cloud.user=u;
  if(Cloud.unsub){try{Cloud.unsub();}catch(e){}Cloud.unsub=null;}
  if(u){AUTHED=true;enterAccount(u);}
  else{AUTHED=false;resetStateToEmpty();VIEW="today";renderAuthGate({});}
  updateSyncUI();
};
function enterAccount(u){
  SKEY="cc_state:"+u.uid;            // isolate this account's cache on shared devices
  loadState(SKEY);
  _prevSig=progressSig();
  if(S.cfg){reflow();render();}else renderWelcome();
  Cloud.subscribe();                 // pull this account's cloud data + offer import if new
}
Cloud.ref=function(){return Cloud.db.collection("users").doc(Cloud.user.uid);};
Cloud.subscribe=function(){if(!Cloud.db||!Cloud.user)return;
  let first=true;
  Cloud.unsub=Cloud.ref().onSnapshot(snap=>{
    const d=snap.data();
    if(first){first=false;if(!d||!d.blob)offerLegacyImportIfAny();}
    if(snap.metadata&&snap.metadata.hasPendingWrites)return;
    if(d&&d.blob){let o=null;try{o=JSON.parse(d.blob);}catch(e){}
      if(o){const cur=persistObj();const m=mergeState(cur,o);if(JSON.stringify(m)!==JSON.stringify(cur))Cloud.adopt(m);if(JSON.stringify(m)!==JSON.stringify(o))Cloud.schedulePush();}}
    else Cloud.schedulePush();
  },err=>{});};
function normalizeBlob(raw){if(raw&&raw.cfg&&!raw.cfgs){const key=(raw.cfg.examType&&raw.cfg.examType!=="step1")?"nbme":"step1";raw.cfgs={step1:null,nbme:null};raw.cfgs[key]=raw.cfg;}return raw;}
function offerLegacyImportIfAny(){
  if(store.get("cc_import_done")==="1")return;
  let raw=null;try{raw=JSON.parse(store.get(LEGACY_KEY)||"null");}catch(e){}
  if(!raw)return;
  const legacyHas=(raw.cfgs&&(raw.cfgs.step1||raw.cfgs.nbme))||(raw.cfg&&raw.cfg.examType)||(raw.vdone&&Object.keys(raw.vdone).length>0);
  const selfEmpty=!S.cfgs.step1&&!S.cfgs.nbme&&Object.keys(S.vdone).length===0;
  if(!legacyHas||!selfEmpty)return;
  modalSheet({title:"Import your earlier progress?",okLabel:"Import it",cancel:true,
    msg:"We found study progress saved on this device from before you signed in. Bring it into this account?",
    onOk:()=>{importLegacy(raw);store.set(LEGACY_KEY,"");store.set("cc_import_done","1");},
    onCancel:()=>{store.set("cc_import_done","1");}});
}
function importLegacy(raw){const cur=persistObj();const m=mergeState(cur,normalizeBlob(raw));Cloud.adopt(m);save();toast("Progress imported ✓");}
Cloud.adopt=function(m){Cloud.applying=true;
  S.active=m.active||null;S.cfgs=m.cfgs||{step1:null,nbme:null};
  S.vdone=m.vdone||{};S.vskip=m.vskip||{};S.vdoneDate=m.vdoneDate||{};S.akdone=m.akdone||{};
  S.notes=m.notes||{};S.streak=m.streak||{days:{}};S.settings=m.settings||{};S._updatedAt=m._updatedAt||0;S._resetAt=m._resetAt||0;
  S.assessments=m.assessments||{};S.uworld=m.uworld||{total:null,blocks:{}};S.uworld.blocks=S.uworld.blocks||{};S.amboss=m.amboss||{total:null,blocks:{}};S.amboss.blocks=S.amboss.blocks||{};S.vshaky=m.vshaky||{};
  ["step1","nbme"].forEach(k=>{if(S.cfgs[k])normalizeCfg(S.cfgs[k],k);});
  S.cfg=S.active?S.cfgs[S.active]:null;_prevSig=progressSig();
  try{store.set(SKEY,JSON.stringify(persistObj()));}catch(e){}
  if(S.cfg){reflow();render();}else{renderWelcome();}
  Cloud.applying=false;updateSyncUI();};
Cloud.schedulePush=function(){if(!Cloud.user||!Cloud.db||Cloud.applying)return;clearTimeout(Cloud.pushT);Cloud.pushT=setTimeout(Cloud.push,1000);};
Cloud.push=function(){if(!Cloud.user||!Cloud.db)return;try{Cloud.ref().set({blob:JSON.stringify(persistObj()),updatedAt:firebase.firestore.FieldValue.serverTimestamp(),email:Cloud.user.email||null,anon:!!Cloud.user.isAnonymous},{merge:true});}catch(e){}};
Cloud.connectGoogle=async function(){if(!fbEnabled()){toast("Sync isn't set up on this copy");return;}
  try{if(!Cloud.inited)await Cloud.init();else if(!window.firebase)await Cloud.loadSDK();}catch(e){}
  const prov=new firebase.auth.GoogleAuthProvider();const cur=firebase.auth().currentUser;
  try{if(cur&&cur.isAnonymous){
      try{await cur.linkWithPopup(prov);toast("Connected — your progress is on your Google account");}
      catch(e){const code=e&&e.code;
        if(code==="auth/credential-already-in-use"||code==="auth/email-already-in-use"){let cred=null;try{cred=firebase.auth.GoogleAuthProvider.credentialFromError(e);}catch(_){}if(!cred&&e&&e.credential)cred=e.credential;
          try{if(cred)await firebase.auth().signInWithCredential(cred);else await firebase.auth().signInWithPopup(prov);toast("Welcome back — merging this device's progress");}catch(e2){toast("Couldn't connect — try again");}}
        else{try{await cur.linkWithRedirect(prov);}catch(_){try{await firebase.auth().signInWithRedirect(prov);}catch(__){toast("Couldn't open Google sign-in");}}}}
    } else {try{await firebase.auth().signInWithPopup(prov);}catch(e){try{await firebase.auth().signInWithRedirect(prov);}catch(e2){toast("Sign-in failed");}}}
  }catch(e){toast("Sign-in failed");}};
Cloud.signOut=function(){try{firebase.auth().signOut();}catch(e){}};

function resBadge(res){const m={bnb:["B&B","bnb"],pathoma:["Pa","pa"],skmicro:["Sk","sk"],skpharm:["Sk","sk"]};const x=m[res]||["·","bnb"];return '<span class="badge '+x[1]+'">'+x[0]+'</span>';}
function resLabel(res){return {bnb:"Boards & Beyond",pathoma:"Pathoma",skmicro:"Sketchy Micro",skpharm:"Sketchy Pharm"}[res]||"Videos";}
function vName(it){let n=it.name;if(it.res==="pathoma")n=n.replace(/^\d+\.\d+(-\d+\.\d+)?\s*/,"");return n;}

/* merge consecutive chunk items of the same label into one row */
function mergeItems(items){const out=[],idx={};items.forEach(it=>{const k=it.res+"|"+it.name;if(idx[k]==null){idx[k]=out.length;out.push({res:it.res,name:it.name,min:it.min,ids:[it.id],sys:it.sys,fa:it.fa,tag:it.tag});}else{const m=out[idx[k]];m.min+=it.min;m.ids.push(it.id);}});return out;}
function itemRows(items,opts){opts=opts||{};if(!items.length)return '<div class="muted small">Nothing scheduled.</div>';
  const order=["bnb","pathoma","skmicro","skpharm"];const merged=mergeItems(items);const groups={};merged.forEach(it=>{(groups[it.res]=groups[it.res]||[]).push(it);});
  const keys=order.filter(k=>groups[k]).concat(Object.keys(groups).filter(k=>order.indexOf(k)<0));
  return keys.map(k=>'<div class="vgrp"><div class="vghdr">'+resLabel(k)+'</div>'+groups[k].map(it=>{
    const done=it.ids.every(isDone);const shaky=it.ids.some(isShaky);const idsAttr=escAttr(it.ids.join(","));
    return '<div class="vrow '+(done?"done":"")+(shaky?" shaky":"")+'">'
      +'<button class="chk '+(done?"on":"")+'" data-ids="'+idsAttr+'" aria-label="watched">'+(done?"✓":"")+'</button>'
      +'<div class="vmeta"><span class="vn">'+escHTML(vName(it))+'</span>'
      +'<span class="vmin">'+it.min+'m</span></div>'
      +'<button class="flagb '+(shaky?"on":"")+'" data-flag="'+idsAttr+'" aria-label="flag for review" title="Flag as shaky — collects in your review queue">⚑</button>'
      +'</div>';}).join('')+'</div>').join('');}

function fallbackCopy(t,msg){try{const ta=document.createElement("textarea");ta.value=t;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.focus();ta.select();document.execCommand("copy");document.body.removeChild(ta);toast(msg||"Copied");}catch(e){toast("Copy failed — long-press to copy");}}
function copyText(t,msg){t=t||"";if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(()=>toast(msg||"Copied"),()=>fallbackCopy(t,msg));}else fallbackCopy(t,msg);}
function dayTagPairs(iso){const row=SCHED&&SCHED.dayMap[iso];if(!row)return [];const seen={},out=[];row.items.forEach(it=>{if(it.res==="bnb"&&it.tag&&!seen[it.tag]){seen[it.tag]=1;out.push([vName(it),it.tag]);}});return out;}

/* ---------- TODAY ---------- */
function render(){
  if(!S.cfg){renderWelcome();return;}
  reflow();
  if(VIEW==="ready"||VIEW==="progress")VIEW="stats"; // legacy views merged into Stats
  if(VIEW==="step"&&S.active!=="nbme")VIEW="today"; // STEP tab is Brody-only
  if(VIEW==="today")renderToday();
  else if(VIEW==="plan")renderPlan();
  else if(VIEW==="stats")renderStats();
  else if(VIEW==="adjust")renderAdjust();
  else if(VIEW==="step")renderStep();
  else renderToday();
  wireChrome();
}

/* ============================================================
   READINESS LAYER (spec Changes 1, 2, 4)
   Self-assessment scores + UWorld accuracy + confidence flags.
   Every value here is USER-ENTERED — nothing is scraped or pulled.
   All three maps live top-level with per-entry merge (see mergeState).
   ============================================================ */
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
// Current NBME Step 1 self-assessment inventory (confirmed via nbme.org, 2026).
// "Other" future-proofs against forms being retired/added.
const NBME_FORMS=["NBME 26","NBME 27","NBME 28","NBME 29","NBME 30","NBME 31","NBME 32","UWSA 1","UWSA 2","UWSA 3","Free 120","Other"];
// Bands are common tutor / NBME-report guidance — NOT guarantees. Framed as such in UI.
function readinessVerdict(pct){
  if(pct==null||isNaN(pct))return {text:"Not yet taken",cls:"info"};
  if(pct>=70)return {text:"in the likely-pass range",cls:"ok"};
  if(pct>=65)return {text:"low-pass range — build a cushion",cls:"warn"};
  return {text:"below the passing range",cls:"bad"};
}
let RDRAFT={form:"NBME 28",dateISO:todayISO(),pct:"",estProb:""};
let UDRAFT={sys:"",q:"40",correct:""};
function assessList(scope){scope=scope||S.active;const a=S.assessments||{};return Object.keys(a).map(k=>Object.assign({id:k},a[k])).filter(x=>x.hub===scope).sort((x,y)=>x.dateISO<y.dateISO?-1:(x.dateISO>y.dateISO?1:(x._t||0)-(y._t||0)));}
function latestAssess(scope){const l=assessList(scope);return l.length?l[l.length-1]:null;}
function addAssessment(o,scope){S.assessments=S.assessments||{};S.assessments[uid()]={hub:(scope||S.active),form:o.form,dateISO:o.dateISO,pct:o.pct,estProb:(o.estProb!=null?o.estProb:null),note:o.note||"",_t:Date.now()};save();}
function delAssessment(id){if(S.assessments&&S.assessments[id]){delete S.assessments[id];save();}}
/* UWorld rollups derived from the append-only block log */
function uworldRollup(scope){scope=scope||S.active;
  const u=S.uworld||{total:null,blocks:{}};const blocks=u.blocks||{};
  const mine=Object.keys(blocks).map(k=>blocks[k]).filter(b=>b&&b.hub===scope);
  let done=0,correct=0;const bySys={};
  mine.forEach(b=>{const q=+b.q||0,c=+b.correct||0;done+=q;correct+=c;
    if(b.sys){const e=bySys[b.sys]=bySys[b.sys]||{done:0,correct:0};e.done+=q;e.correct+=c;}});
  Object.keys(bySys).forEach(s=>{const e=bySys[s];e.pct=e.done?Math.round(e.correct/e.done*100):null;});
  return {total:u.total,done,correct,pct:done?Math.round(correct/done*100):null,bySys};
}
function addUworldBlock(o,scope){S.uworld=S.uworld||{total:null,blocks:{}};S.uworld.blocks=S.uworld.blocks||{};S.uworld.blocks[uid()]={hub:(scope||S.active),dateISO:o.dateISO||todayISO(),sys:o.sys||"",q:+o.q||0,correct:+o.correct||0,mode:o.mode||"random",_t:Date.now()};save();}
function setUworldTotal(n){S.uworld=S.uworld||{total:null,blocks:{}};S.uworld.total=(n>0?n:null);save();}

function addAmbossBlock(o,scope){S.amboss=S.amboss||{total:null,blocks:{}};S.amboss.blocks=S.amboss.blocks||{};S.amboss.blocks[uid()]={hub:(scope||S.active),dateISO:o.dateISO||todayISO(),sys:o.sys||"",q:+o.q||0,correct:+o.correct||0,_t:Date.now()};save();}

function scoreTrend(list){
  const W=320,H=96,padL=22,padR=8,padT=10,padB=16;const ys=list.map(x=>x.pct);
  const minY=Math.min(60,Math.min.apply(null,ys)-3),maxY=Math.max(85,Math.max.apply(null,ys)+3);
  const ix=i=>padL+(list.length<=1?0:i/(list.length-1))*(W-padL-padR);
  const iy=v=>padT+(1-(v-minY)/(maxY-minY))*(H-padT-padB);
  let svg='<svg viewBox="0 0 '+W+' '+H+'" class="pacesvg">';
  [65,70].forEach(t=>{if(t>=minY&&t<=maxY){const y=iy(t);svg+='<line x1="'+padL+'" y1="'+y.toFixed(1)+'" x2="'+(W-padR)+'" y2="'+y.toFixed(1)+'" class="pgrid"/><text x="'+(padL-3)+'" y="'+(y+3).toFixed(1)+'" class="pax" text-anchor="end">'+t+'</text>';}});
  svg+='<polyline points="'+list.map((x,i)=>ix(i).toFixed(1)+","+iy(x.pct).toFixed(1)).join(" ")+'" class="pactual"/>';
  list.forEach((x,i)=>{svg+='<circle cx="'+ix(i).toFixed(1)+'" cy="'+iy(x.pct).toFixed(1)+'" r="2.7" fill="var(--phos)"/>';});
  svg+='</svg>';return svg;
}

function daySeed(){const s=todayISO();let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))|0;return Math.abs(h);}

function cheerHTML(text,author){
  const body=author
    ?'“'+escHTML(text)+'” <span class="cheer-by">— '+escHTML(author)+'</span>'
    :escHTML(text);
  return '<div class="cheer"><div class="cheer-tx"><b>'+greeting()+'.</b> '+body+'</div></div>';
}
function encouragement(todayRow,isOff,streak){
  const allDone=todayRow&&!isOff&&todayRow.items.length&&todayRow.items.every(it=>isDone(it.id));
  if(allDone)return cheerHTML("Today's plan is complete. Rest easy tonight.",null);
  if(isOff){const rest=QUOTES.filter(q=>q.th==="rest");const q=rest[daySeed()%rest.length];return cheerHTML(q.t,q.a);}
  if(streak>=3&&daySeed()%4===0)return cheerHTML(streak+" days running. Consistency is the whole of it — keep the thread going.",null);
  const q=QUOTES[daySeed()%QUOTES.length];
  return cheerHTML(q.t,q.a);
}

function pad2(n){return (n<10?"0":"")+n;}
function fmtH(min){if(min<60)return min+"m";return (Math.round(min/60*10)/10)+"h";}
function ymShift(ym,delta){let p=ym.split("-").map(Number),y=p[0],m=p[1];m+=delta;while(m<1){m+=12;y--;}while(m>12){m-=12;y++;}return y+"-"+pad2(m);}
function monthMatrix(ym){const p=ym.split("-").map(Number),y=p[0],m=p[1];
  const startDow=new Date(y,m-1,1).getDay();const dim=new Date(y,m,0).getDate();const cells=[];
  for(let i=0;i<startDow;i++)cells.push(null);
  for(let d=1;d<=dim;d++)cells.push(isoFromDate(new Date(y,m-1,d)));
  while(cells.length%7!==0)cells.push(null);
  return cells;}

/* pacing burn-up: target pace vs actual completion over the whole timeline */
function pacingChart(){
  const c=S.cfg; if(!c||!c.examISO)return "";
  const start=c.startISO||todayISO(), exam=c.examISO, today=todayISO();
  const items=buildBacklog(); const minById={}; let totalMin=0;
  items.forEach(it=>{minById[it.id]=it.min;totalMin+=it.min;});
  if(!totalMin||exam<=start)return "";
  const rest=c.restDays||[0], off=c.off||{};
  const studyDates=[]; let d=isoToDate(start),g=0;
  while(isoFromDate(d)<exam&&g++<3000){const iso=isoFromDate(d);const wd=d.getDay();if(!rest.includes(wd)&&!off[iso])studyDates.push(iso);d=addDays(d,1);}
  const review=Math.max(0,Math.min(c.reviewDays||0,studyDates.length));
  const contentDates=studyDates.slice(0,studyDates.length-review);
  const totalStudyDays=contentDates.length||1; const contentSet={}; contentDates.forEach(iso=>contentSet[iso]=1);
  // actual completed minutes, bucketed by completion date
  const doneByDate={}; let doneMin=0;
  items.forEach(it=>{if(isDone(it.id)){const dt=(S.vdoneDate&&S.vdoneDate[it.id])||start;doneByDate[dt]=(doneByDate[dt]||0)+it.min;doneMin+=it.min;}});
  const totalDays=Math.max(1,daysBetween(start,exam));
  let cEl=0,aCum=0; const idealPts=[],actualPts=[]; let cur=isoToDate(start),gg=0;
  while(isoFromDate(cur)<=exam&&gg++<3000){const iso=isoFromDate(cur);
    if(contentSet[iso])cEl++;
    const idealMin=Math.min(totalMin,totalMin*cEl/totalStudyDays);
    aCum+=(doneByDate[iso]||0);
    const x=daysBetween(start,iso)/totalDays;
    idealPts.push([x,idealMin]); if(iso<=today)actualPts.push([x,aCum]);
    cur=addDays(cur,1);
  }
  let cToday=0; contentDates.forEach(iso=>{if(iso<today)cToday++;});
  const idealToday=Math.min(totalMin,totalMin*cToday/totalStudyDays);
  const avgPerDay=totalMin/totalStudyDays; const diff=doneMin-idealToday;
  const diffH=(Math.abs(diff)/60).toFixed(1); const diffDays=avgPerDay?Math.round(Math.abs(diff)/avgPerDay):0;
  const dW=diffDays===1?"day":"days";
  let cls,txt;
  if(today<start){cls="info";txt="Your plan starts "+fmtDate(start)+" — pacing begins then.";}
  else if(today>exam){cls=doneMin>=totalMin-avgPerDay?"ok":"warn";txt=doneMin>=totalMin?"Plan complete — every video done.":"Exam date passed with ~"+((totalMin-doneMin)/60).toFixed(1)+" h of videos unfinished.";}
  else if(Math.abs(diff)<avgPerDay*0.5){cls="ok";txt="On pace — right about where your plan expects you today.";}
  else if(diff>0){cls="ok";txt="Ahead by ~"+diffH+" h ("+diffDays+" study "+dW+"). Nice work.";}
  else {cls="warn";txt="Behind by ~"+diffH+" h ("+diffDays+" study "+dW+"). Catch up, or rebalance in Plan.";}
  // svg
  const W=340,H=168,padL=30,padR=10,padT=12,padB=20;
  const ix=x=>padL+x*(W-padL-padR); const iy=v=>padT+(1-v/totalMin)*(H-padT-padB);
  const poly=arr=>arr.map(p=>ix(p[0]).toFixed(1)+","+iy(p[1]).toFixed(1)).join(" ");
  const baseY=iy(0),topY=iy(totalMin);
  let area="";
  if(actualPts.length>1){area="M"+ix(actualPts[0][0]).toFixed(1)+","+iy(actualPts[0][1]).toFixed(1);
    for(let i=1;i<actualPts.length;i++)area+=" L"+ix(actualPts[i][0]).toFixed(1)+","+iy(actualPts[i][1]).toFixed(1);
    area+=" L"+ix(actualPts[actualPts.length-1][0]).toFixed(1)+","+baseY.toFixed(1)+" L"+ix(actualPts[0][0]).toFixed(1)+","+baseY.toFixed(1)+" Z";}
  const tx=ix(Math.min(1,Math.max(0,daysBetween(start,today)/totalDays)));
  let svg='<svg viewBox="0 0 '+W+' '+H+'" class="pacesvg" preserveAspectRatio="xMidYMid meet">';
  for(let q=0;q<=4;q++){const gy=(padT+(q/4)*(H-padT-padB)).toFixed(1);svg+='<line x1="'+padL+'" y1="'+gy+'" x2="'+(W-padR)+'" y2="'+gy+'" class="pgrid"/>';}
  svg+='<text x="'+(padL-4)+'" y="'+(topY+3).toFixed(1)+'" class="pax" text-anchor="end">'+Math.round(totalMin/60)+'h</text>';
  svg+='<text x="'+(padL-4)+'" y="'+(baseY+3).toFixed(1)+'" class="pax" text-anchor="end">0</text>';
  if(today>=start&&today<=exam){svg+='<line x1="'+tx.toFixed(1)+'" y1="'+padT+'" x2="'+tx.toFixed(1)+'" y2="'+(H-padB)+'" class="ptoday"/><text x="'+tx.toFixed(1)+'" y="'+(padT-3)+'" class="pax" text-anchor="middle">today</text>';}
  if(area)svg+='<path d="'+area+'" class="parea"/>';
  svg+='<polyline points="'+poly(idealPts)+'" class="pideal"/>';
  if(actualPts.length)svg+='<polyline points="'+poly(actualPts)+'" class="pactual"/>';
  svg+='<text x="'+padL+'" y="'+(H-6)+'" class="pax" text-anchor="start">'+fmtShort(start)+'</text>';
  svg+='<text x="'+(W-padR)+'" y="'+(H-6)+'" class="pax" text-anchor="end">'+fmtShort(exam)+'</text>';
  svg+='</svg>';
  return '<div class="card"><div class="cardhd">Pacing</div><div class="status '+cls+'">'+txt+'</div>'+svg
    +'<div class="placeleg"><span class="pl pl-a">Completed</span><span class="pl pl-i">Target pace</span></div></div>';
}

function authErr(msg){const e=document.getElementById("auth_err");if(e){e.textContent=msg||"";e.style.display=msg?"block":"none";}}
function authBusy(b){const g=document.getElementById("auth_go");if(g){g.disabled=b;g.textContent=b?"Please wait\u2026":(AUTH_MODE==="signup"?"Create account":"Sign in");}}
function authReady(){return !!(window.firebase&&firebase.auth);}
function authMsg(e){const c=(e&&e.code)||"";
  if(c==="auth/invalid-email")return "That doesn\u2019t look like a valid email.";
  if(c==="auth/missing-password")return "Enter your password.";
  if(c==="auth/weak-password")return "Password must be at least 6 characters.";
  if(c==="auth/email-already-in-use")return "An account with that email already exists \u2014 try signing in instead.";
  if(c==="auth/user-not-found"||c==="auth/wrong-password"||c==="auth/invalid-credential"||c==="auth/invalid-login-credentials")return "Email or password is incorrect.";
  if(c==="auth/too-many-requests")return "Too many attempts \u2014 wait a moment and try again.";
  if(c==="auth/network-request-failed")return "Network error \u2014 check your connection.";
  if(c==="auth/user-disabled")return "This account has been disabled.";
  return (e&&e.message)?String(e.message).replace(/^Firebase:\s*/,"").replace(/\s*\(auth\/[^)]+\)\.?$/,""):"Something went wrong. Try again.";
}
function authSubmit(){
  if(!authReady()){authErr("Couldn\u2019t reach the server \u2014 check your connection and try again.");return;}
  const email=((document.getElementById("auth_email")||{}).value||"").trim();
  const pw=(document.getElementById("auth_pw")||{}).value||"";
  if(!email){authErr("Enter your email.");return;}
  if(!pw){authErr("Enter your password.");return;}
  if(!emailAllowed(email)){authErr(ACCESS_MSG);return;}
  authErr("");authBusy(true);
  const a=firebase.auth();
  const p=(AUTH_MODE==="signup")?a.createUserWithEmailAndPassword(email,pw):a.signInWithEmailAndPassword(email,pw);
  // onAuthStateChanged takes over and renders the app on success
  p.catch(e=>{authBusy(false);authErr(authMsg(e));});
}
function authForgot(){
  if(!authReady()){authErr("Connect to the internet to reset your password.");return;}
  const email=((document.getElementById("auth_email")||{}).value||"").trim();
  if(!email){authErr("Enter your email above first, then tap \u201cForgot password?\u201d");return;}
  firebase.auth().sendPasswordResetEmail(email).then(()=>{authErr("");toast("Password reset email sent");}).catch(e=>authErr(authMsg(e)));
}

function enterHub(key){if(!S.cfgs[key]){startOnboard(key);return;}activate(key);S.active=key;VIEW="today";reflow();render();}

/* ---------- ONBOARDING (per hub) ---------- */
let _ob=null;
function defaultsForHub(key,fresh){const ex=fresh?null:S.cfgs[key];
  let o;
  if(ex)o={hub:key,fresh:false,examLabel:ex.examLabel||"",examISO:ex.examISO||"",startISO:ex.startISO||todayISO(),wkdayHrs:ex.wkdayHrs,wkendHrs:ex.wkendHrs,restDays:(ex.restDays||[0]).slice(),reviewDays:ex.reviewDays,resources:Object.assign({bnb:true,pathoma:true,sketchy:true,fa:true,anking:true,uworld:true},ex.resources||{}),systems:(ex.systems||SYS).slice(),sysOrder:(ex.sysOrder&&ex.sysOrder.length===SYS.length?ex.sysOrder:SYS_ORDER_DEFAULT).slice()};
  else o={hub:key,fresh:!!fresh,examLabel:key==="step1"?"Step 1":"",examISO:"",startISO:todayISO(),wkdayHrs:6,wkendHrs:4,restDays:[0],reviewDays:14,resources:{bnb:true,pathoma:true,sketchy:true,fa:true,anking:true,uworld:true},systems:(key==="nbme"?[]:SYS.slice()),sysOrder:SYS_ORDER_DEFAULT.slice()};
  // NBME hub now selects individual systems (like Step 1); migrate any legacy block selection
  if(key==="nbme"&&ex&&(!ex.systems||!ex.systems.length)&&Array.isArray(ex.blocks)&&ex.blocks.length){
    const set=new Set(ex.blocks);o.systems=flatSys((ex.blockOrder||blockNames()).filter(b=>set.has(b)));
  }
  return o;
}
/* ordered, includable, reorderable system list (shared by onboarding + Adjust) */
function orderedSysHTML(order,included){const set=new Set(included);

      +'<button type="button" class="ordbtn" data-sdn="'+i+'"'+(i===order.length-1?' disabled':'')+' aria-label="move down">▼</button></span>'
      +'</div>';}).join('')+'</div>';}
/* block-level list for the NBME hub (combined units) */
function startOnboard(key,fresh){_ob=defaultsForHub(key,fresh);renderOnboard();}
function obIsNbme(){return _ob&&_ob.hub==="nbme";}
function renderOnboard(){
  if(!_ob)_ob=defaultsForHub("step1");

  const dows=DOW.map((d,i)=>'<button type="button" class="tog '+(ob.restDays.includes(i)?"on":"")+'" data-odow="'+i+'">'+d+'</button>').join('');
  const resBtn=(k,lab)=>'<button type="button" class="tog '+(ob.resources[k]?"on":"")+'" data-ores="'+k+'">'+lab+'</button>';
  let body='<div class="onboard"><button class="link" id="o_back">'+closeLbl+'</button><h1>'+headVerb+escHTML(ob.fresh?"M2 Scheduler":hubName(ob.hub))+'</h1><p class="muted">A plan that paces itself to your exam date and re-flows whenever life happens.</p>';
  if(obIsNbme())body+='<div class="card"><div class="cardhd">Which exam?</div><div class="form"><label>Name this exam<input type="text" id="o_label" value="'+escAttr(ob.examLabel)+'" placeholder="e.g. Cardiology shelf"></label></div></div>';
  body+='<div class="card"><div class="cardhd">Dates</div><div class="form">'

  body+='<div class="card"><div class="cardhd">How much can you study?</div><div class="form">'
    +'<label>Weekday hours/day<input type="number" id="o_wk" min="0" step="0.5" value="'+ob.wkdayHrs+'"></label>'
    +'<label>Weekend hours/day<input type="number" id="o_we" min="0" step="0.5" value="'+ob.wkendHrs+'"></label>'
    +'<div class="flab">Weekly rest days</div><div class="togrow">'+dows+'</div>'
    +'<label class="mt">UWorld / review buffer — finish content this many study days before your exam<input type="number" id="o_rev" min="0" step="1" value="'+ob.reviewDays+'"></label>'
    +'</div></div>';
  body+='<div class="card"><div class="cardhd">Resources</div><div class="togrow">'
    +resBtn("bnb","Boards &amp; Beyond")+resBtn("pathoma","Pathoma")+resBtn("sketchy","Sketchy")+resBtn("fa","First Aid")+resBtn("anking","AnKing")+resBtn("uworld","UWorld")
    +'</div><p class="muted small">Turn on the video resources you use \u2014 they interleave into the plan.</p></div>';
  {const obSysInner='<p class="muted small" style="margin-top:6px">'+(obIsNbme()
      ?'Tap the systems this shelf covers \u2014 immuno, micro, genetics, biochem and the rest are each selectable. The B&amp;B/Pathoma topics for each come with it. Reorder with \u25b2\u25bc to set what you study first.'
      :'This is the recommended Boards &amp; Beyond sequence. Reorder with \u25b2\u25bc, and tap a system to include or drop it.')+'</p>'
    + orderedSysHTML(ob.sysOrder,ob.systems)
    + '<button class="link" id="sordReset">\u21ba Reset to recommended order</button>';
  body+='<div class="card"><div class="cardhd">'+(obIsNbme()?'Units &amp; study order':'Study order &amp; systems')+'</div>'
    + fold("ob_sys",ob.systems.length+' of '+SYS.length+' systems selected \u2014 edit / reorder',obSysInner,obIsNbme())+'</div>';}
  body+='<div class="card soft" id="o_reco"><div class="cardhd">Recommended pace</div>'+obPreview()+'</div>';
  body+='<button class="btn big" id="o_go">'+goLbl+'</button>';
  body+='</div>';

  const ol=document.getElementById("o_label");if(ol)ol.onchange=()=>{ob.examLabel=ol.value||"Shelf exam";};
  const oe=document.getElementById("o_exam");if(oe)oe.onclick=()=>openDatePicker({value:ob.examISO,min:todayISO(),title:"Exam date",onPick:(iso)=>{ob.examISO=iso;renderOnboard();}});
  const os=document.getElementById("o_start");if(os)os.onclick=()=>openDatePicker({value:ob.startISO,title:"Start date",onPick:(iso)=>{ob.startISO=iso;renderOnboard();}});
  const bindN=(id,k)=>{const e=document.getElementById(id);if(e)e.onchange=()=>{let v=parseFloat(e.value);if(isNaN(v)||v<0)v=0;ob[k]=v;obLive();};};
  bindN("o_wk","wkdayHrs");bindN("o_we","wkendHrs");
  const orv=document.getElementById("o_rev");if(orv)orv.onchange=()=>{let v=parseInt(orv.value,10);if(isNaN(v)||v<0)v=0;ob.reviewDays=v;obLive();};
  document.querySelectorAll("[data-odow]").forEach(b=>b.onclick=()=>{const i=+b.dataset.odow;const k=ob.restDays.indexOf(i);if(k>=0)ob.restDays.splice(k,1);else ob.restDays.push(i);renderObTogs();});
  document.querySelectorAll("[data-ores]").forEach(b=>b.onclick=()=>{ob.resources[b.dataset.ores]=!ob.resources[b.dataset.ores];renderObTogs();obLive();});
  document.querySelectorAll("[data-sinc]").forEach(b=>b.onclick=()=>{const s=b.dataset.sinc;const k=ob.systems.indexOf(s);if(k>=0){if(ob.systems.length>1)ob.systems.splice(k,1);}else ob.systems.push(s);renderOnboard();});
  document.querySelectorAll("[data-sup]").forEach(b=>b.onclick=()=>{const i=+b.dataset.sup;if(i>0){const a=ob.sysOrder;const t=a[i-1];a[i-1]=a[i];a[i]=t;renderOnboard();}});
  document.querySelectorAll("[data-sdn]").forEach(b=>b.onclick=()=>{const i=+b.dataset.sdn;const a=ob.sysOrder;if(i<a.length-1){const t=a[i+1];a[i+1]=a[i];a[i]=t;renderOnboard();}});
  const sr=document.getElementById("sordReset");if(sr)sr.onclick=()=>{ob.sysOrder=SYS_ORDER_DEFAULT.slice();renderOnboard();};
  const go=document.getElementById("o_go");if(go)go.onclick=commitOnboard;
  const bk=document.getElementById("o_back");if(bk)bk.onclick=()=>{if((editing||ob.fresh)&&S.cfgs[ob.hub]){activate(ob.hub);S.active=ob.hub;VIEW="today";reflow();render();}else renderWelcome();};
  bindUsePace();bindFolds();
