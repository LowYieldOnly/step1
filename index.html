function renderObTogs(){
  document.querySelectorAll("[data-odow]").forEach(b=>b.classList.toggle("on",_ob.restDays.includes(+b.dataset.odow)));
  document.querySelectorAll("[data-ores]").forEach(b=>b.classList.toggle("on",!!_ob.resources[b.dataset.ores]));
}
function obLive(){const c=document.getElementById("o_reco");if(c){c.innerHTML='<div class="cardhd">Recommended pace</div>'+obPreview();bindUsePace();}}
/* pacing recommendation for onboarding — a suggestion only; the user keeps
   full control of rest days and weekday/weekend hours. */
function obReco(){const ob=_ob;
  if(!ob.examISO)return {ok:false,msg:"Pick an exam date to see your recommended pace."};
  if(ob.hub==="nbme"&&!ob.systems.length)return {ok:false,msg:"Pick the units this shelf covers to see your recommended pace."};
  const order=(ob.sysOrder||SYS_ORDER_DEFAULT).filter(s=>new Set(ob.systems).has(s));
  let total=0;const bySys={};CAT.forEach(c=>bySys[c.s]=c);
  if(ob.resources.pathoma)PATHOMA.filter(p=>p[3]===null).forEach(p=>total+=p[2]);
  order.forEach(sn=>{const c=bySys[sn];if(!c)return;if(ob.resources.bnb)c.v.forEach(v=>total+=v[1]);if(ob.resources.pathoma)PATHOMA.filter(p=>p[3]===sn).forEach(p=>total+=p[2]);if(ob.resources.sketchy&&sn==="Infectious Disease")SKMICRO.forEach(m=>total+=m[1]);if(ob.resources.sketchy)SKPHARM.filter(s=>s[2]===sn).forEach(s=>total+=s[1]);});
  if(!total)return {ok:false,msg:"Turn on at least one video resource (B&amp;B, Pathoma, or Sketchy)."};
  const cur=(ob.startISO>todayISO())?ob.startISO:todayISO();const rest=ob.restDays||[];
  let d=isoToDate(cur),g=0;const sdw=[];
  while(isoFromDate(d)<ob.examISO&&g++<800){const wd=d.getDay();if(rest.indexOf(wd)<0)sdw.push(wd);d=addDays(d,1);}
  const sd=sdw.length;const content=Math.max(1,sd-(ob.reviewDays||0));
  const totalH=total/60;const perDay=totalH/content;
  const studyDaysPerWeek=Math.max(1,7-rest.length);const perWeek=perDay*studyDaysPerWeek;
  let cap=0;for(let i=0;i<content&&i<sdw.length;i++){cap+=((sdw[i]===0||sdw[i]===6)?(ob.wkendHrs||0):(ob.wkdayHrs||0));}
  const feasible=cap>=totalH-0.05;const gap=Math.max(0,totalH-cap);
  return {ok:true,totalH:Math.round(totalH),nSys:order.length,sd:sd,content:content,perDay:perDay,perWeek:perWeek,reviewDays:(ob.reviewDays||0),feasible:feasible,gap:gap,wd:ob.wkdayHrs,we:ob.wkendHrs,fromISO:cur,examISO:ob.examISO};
}
function obPreview(){const r=obReco();
  if(!r.ok)return '<p class="muted small" style="margin:0">'+r.msg+'</p>';
  const pd=Math.round(r.perDay*10)/10,pw=Math.round(r.perWeek);
  let h='<p class="muted small" style="margin:0 0 8px">'+r.totalH+' h of video across '+r.nSys+' system'+(r.nSys>1?"s":"")+', '+fmtShort(r.fromISO)+' \u2192 '+fmtShort(r.examISO)+'. To finish before your '+r.reviewDays+'-study-day question buffer, aim for about <b>'+pd+' h/day</b> on study days (\u2248 <b>'+pw+' h/week</b>).</p>';
  h+='<button type="button" class="btn ghost" id="o_usepace">Use this pace ('+Math.max(0.5,Math.ceil(r.perDay*2)/2)+' h/day)</button>';
  h+='<p class="small" style="margin:8px 0 0;color:'+(r.feasible?"var(--text-2)":"var(--warning)")+'">'+(r.feasible?("\u2713 Your hours ("+r.wd+" weekday / "+r.we+" weekend) cover this with room to spare \u2014 adjust anytime."):("\u26a0 Your hours ("+r.wd+" wd / "+r.we+" we) fall about "+Math.ceil(r.gap)+" h short. Raise your hours, lengthen the buffer, move the date, or trim resources."))+'</p>';
  return h;
}
function bindUsePace(){const u=document.getElementById("o_usepace");if(u)u.onclick=()=>{const r=obReco();if(r.ok){const pd=Math.max(0.5,Math.ceil(r.perDay*2)/2);_ob.wkdayHrs=pd;_ob.wkendHrs=pd;renderOnboard();}};}
function commitOnboard(){const ob=_ob;
  if(!ob.examISO){toast("Pick an exam date first");return;}
  if(!ob.systems.length){toast("Pick at least one system");return;}
  const key=ob.hub;
  const prev=S.cfgs[key]?JSON.parse(JSON.stringify(S.cfgs[key])):null;
  const c=S.cfgs[key]||{};
  Object.assign(c,{examType:key,examLabel:key==="step1"?"Step 1":(ob.examLabel||"Shelf exam"),
    examISO:ob.examISO,startISO:ob.startISO,wkdayHrs:ob.wkdayHrs,wkendHrs:ob.wkendHrs,restDays:ob.restDays.slice(),
    reviewDays:ob.reviewDays,resources:Object.assign({},ob.resources),systems:ob.systems.slice(),sysOrder:(ob.sysOrder||SYS_ORDER_DEFAULT).slice()});
  c.off=c.off||{};
  S.cfgs[key]=c;activate(key);S.active=key;
  save();reflow();VIEW="today";render();
  if(prev)toastUndo(ob.fresh?"New unit started — undo to restore the last one.":"Plan updated.",()=>{S.cfgs[key]=prev;activate(key);save();reflow();render();});
  else toast(hubName(key)+" ready.");
}

/* ---------- MENU (sync / backup / help) ---------- */
function modalSheet(o){
  // o: {title, msg, okLabel, onOk, danger, cancel(bool, default true), okClass}
  const cancel=o.cancel!==false;
  const okCls=o.okClass||(o.danger?"solidred":"ctr");
  const ov=document.createElement("div");ov.className="overlay";ov.id="modal";
  ov.innerHTML='<div class="sheet"><div class="sheethd">'+escHTML(o.title||"")+'</div>'
    +(o.msg?'<p class="cfmsg">'+escHTML(o.msg)+'</p>':'')
    +'<button class="mrow '+okCls+'" data-c="ok">'+escHTML(o.okLabel||"OK")+'</button>'
    +(cancel?'<button class="mrow close ctr" data-c="cancel">Cancel</button>':'')
    +'</div>';
  ov.onclick=(e)=>{if(e.target===ov)ov.remove();};
  document.body.appendChild(ov);
  const ok=ov.querySelector('[data-c="ok"]');if(ok)ok.onclick=()=>{ov.remove();if(o.onOk)o.onOk();};
  const cx=ov.querySelector('[data-c="cancel"]');if(cx)cx.onclick=()=>{ov.remove();if(o.onCancel)o.onCancel();};
}
function doResetAll(){
  // nuclear: wipe progress AND the saved plans, drop the user back to the
  // setup screen to craft a fresh plan. Tombstoned so sync can't resurrect it.
  const snap={vdone:S.vdone,vskip:S.vskip,vdoneDate:S.vdoneDate,akdone:S.akdone,notes:S.notes,assessments:S.assessments,uworld:S.uworld,amboss:S.amboss,vshaky:S.vshaky,streak:S.streak,cfgs:S.cfgs,active:S.active};
  S.vdone={};S.vskip={};S.vdoneDate={};S.akdone={};S.notes={};S.assessments={};S.uworld={total:null,blocks:{}};S.amboss={total:null,blocks:{}};S.vshaky={};S.streak={days:{}};
  S.cfgs={step1:null,nbme:null};S.active=null;S.cfg=null;_prevSig=0;S._resetAt=Date.now();save();
  renderWelcome();
  toastUndo("Everything cleared — build a new plan, or tap Undo to restore.",()=>{
    S.vdone=snap.vdone;S.vskip=snap.vskip;S.vdoneDate=snap.vdoneDate;S.akdone=snap.akdone;S.notes=snap.notes;S.assessments=snap.assessments;S.uworld=snap.uworld;S.amboss=snap.amboss;S.vshaky=snap.vshaky;S.streak=snap.streak;
    S.cfgs=snap.cfgs;S.active=snap.active;S.cfg=S.active?S.cfgs[S.active]:null;_prevSig=progressSig();save();
    if(S.cfg){reflow();render();}else renderWelcome();toast("Restored ✓");});
}
const BUILD="2026-07-15g";

}

/* ---------- boot ---------- */
/* ---------- theme (light / dark, follows OS until the user overrides) ---------- */
const Theme={KEY:"lyo_theme",META:{light:"#FAF7FC",dark:"#0C0912"},
  system(){try{return matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light";}catch(e){return "dark";}},
  saved(){const v=store.get(this.KEY);return (v==="light"||v==="dark")?v:null;},
  current(){return this.saved()||this.system();},
  apply(mode){const m=(mode==="light"||mode==="dark")?mode:this.current();
    document.documentElement.setAttribute("data-theme",m);
    const mt=document.querySelector('meta[name="theme-color"]');if(mt)mt.setAttribute("content",this.META[m]);
    return m;},
  set(mode){store.set(this.KEY,mode);this.apply(mode);},
  toggle(){this.set(this.current()==="dark"?"light":"dark");toast(this.current()==="dark"?"Dark theme":"Light theme");},
  init(){this.apply();
    try{matchMedia("(prefers-color-scheme: dark)").addEventListener("change",()=>{if(!this.saved())this.apply();});}catch(e){}}
};
function boot(){
  Theme.init();
  wireFileInput();
  registerSW();
  if(!fbEnabled()){
    app.innerHTML='<div class="wrap welcomewrap"><div class="welcome"><div class="wbrand">Low Yield Only</div><p class="wtag">Accounts aren\u2019t configured on this copy.</p></div></div>';
    return;
  }
  renderAuthChecking();
  Cloud.init();
  // if the SDK can't load (offline on a first-ever visit), surface a clear message
  setTimeout(()=>{if(!AUTHED&&!authReady())renderAuthGate({offline:true});},9000);
}
function wireFileInput(){
  const inp=document.getElementById("fileIn");
  if(inp)inp.onchange=(e)=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const o=JSON.parse(r.result);
    if(o.cfgs!==undefined)S.cfgs=o.cfgs;else if(o.cfg!==undefined){const key=(o.cfg.examType&&o.cfg.examType!=="step1")?"nbme":"step1";S.cfgs={step1:null,nbme:null};S.cfgs[key]=o.cfg;}
    ["vdone","vskip","vdoneDate","akdone","notes","streak","assessments","uworld","amboss","vshaky","_resetAt"].forEach(k=>{if(o[k]!==undefined)S[k]=o[k];});
    S.uworld=S.uworld||{total:null,blocks:{}};S.uworld.blocks=S.uworld.blocks||{};
    ["step1","nbme"].forEach(k=>{if(S.cfgs[k])normalizeCfg(S.cfgs[k],k);});
    S.active=null;S.cfg=null;_prevSig=progressSig();save();renderWelcome();toast("Backup restored");
  }catch(err){toast("Couldn't read that file");}};r.readAsText(f);};
}
function registerSW(){try{if("serviceWorker"in navigator&&location.protocol.indexOf("http")===0){navigator.serviceWorker.register("sw.js").catch(()=>{});}}catch(e){}}
function updateSyncUI(){/* menu reflects state when opened; nothing persistent to update */}

document.addEventListener("DOMContentLoaded",boot);
